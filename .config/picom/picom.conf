shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'firefox'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
inactive-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = false;
inactive-dim = 0.0;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
focus-exclude = [ "class_g = 'albert'" ];
focus-exclude = [ "class_g = 'firefox'" ];
focus-exclude = [ "class_g = 'fcitx5'"];
opacity-rule = [
  "100:class_g = 'fcitx5'",
  "100:class_g = 'firefox'",
  "100:class_g = 'mpv'",
  "100:class_g = 'vim'",
]
corner-radius = 0
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
blur-kern = "3x3box";
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c" ,
  "window_type = 'menu'" ,
  "window_type = 'dropdown_menu'" ,
  "window_type = 'popup_menu'" ,
  "window_type = 'tooltip'" 
];
backend = "xrender";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};
fade-in-step=1
fade-out-step=1
fade-delta=0
backend = "xrender";
vsync = false ;
menu          = { shadow = false; };
dropdown_menu = { shadow = false; };
popup_menu    = { shadow = false; };
utility       = { shadow = false; };
