tabspaces: 2
window:
  dimensions:
    columns: 90
    lines: 25

font :
  normal :
    family : "consolas"
    style : Medium
  bold :
    family : "consolas"
    style : Bold
  italic :
    family : "consolas"
    style : Italic
  bold_italic :
    family : "consolas"
    style : "Bold Italic"

  size : 16

